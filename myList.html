        function displayMyList() {
            gridContainer.innerHTML = "";
            const savedShows = showsData.filter(show => wishlist.includes(show.id));

            if (savedShows.length === 0) {
                if (emptyMessage) emptyMessage.style.display = "block";
                return;
            }

            if (emptyMessage) emptyMessage.style.display = "none";

            savedShows.forEach(show => {
                const card = document.createElement('div');
                card.classList.add('show-card');

                card.innerHTML = `
            <div class="poster-container">
                <div class="wishlist-btn added" data-id="${show.id}">✓</div>
                <img src="${show.image}" alt="${show.title}" loading="lazy">
            </div>
            <div class="show-title">${show.title}</div>
        `;

                const btn = card.querySelector('.wishlist-btn');
                btn.addEventListener('click', (e) => {
                    e.stopPropagation(); // Prevents details page from opening when removing
                    removeFromWishlist(show.id);
                });

                card.addEventListener('click', () => {
                    openMovieDetails(show);
                });

                gridContainer.appendChild(card);
            });
        }

            document.getElementById('modal-title').innerText = show.title;
            document.getElementById('modal-year').innerText = show.year;
            document.getElementById('modal-cert').innerText = show.certificate;
            document.getElementById('modal-seasons').innerText = show.seasons;
            document.getElementById('modal-desc').innerText = show.description;
            document.getElementById('modal-genre').innerText = show.genre;
            document.getElementById('modal-cast').innerText = show.cast;

            mainVideo.src = show.videoUrl;

            const playBtn = document.getElementById('modal-play-btn');
            playBtn.onclick = () => {
                videoPlayerContainer.style.display = 'block';
                mainVideo.play();
            };

            movieModal.style.display = 'flex';
        }

        function hideModal() {
            movieModal.style.display = 'none';
            closeVideoPlayer();
        }

        function closeVideoPlayer() {
            mainVideo.pause();
            mainVideo.currentTime = 0;
            videoPlayerContainer.style.display = 'none';
        }

        if (closeModalBtn) closeModalBtn.addEventListener('click', hideModal);
        if (closePlayerBtn) closePlayerBtn.addEventListener('click', closeVideoPlayer);

        window.addEventListener('click', (e) => {
            if (e.target === movieModal) {
                hideModal();
            }
        });

        function removeFromWishlist(id) {
            wishlist = wishlist.filter(item => item !== id);
            localStorage.setItem('netflix-wishlist', JSON.stringify(wishlist));
            displayMyList();
        }

        displayMyList();

        const hamburger = document.getElementById("hamburger");
        const mobileMenu = document.getElementById("mobile-menu");
        const closeBtn = document.getElementById("close-btn");


        // Open Menu

        hamburger.addEventListener("click", () => {

            mobileMenu.classList.add("active");

        });


        // Close Menu

        closeBtn.addEventListener("click", () => {

            mobileMenu.classList.remove("active");

        });

    </script>

</body>

</html>
